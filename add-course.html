<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">📚 Course Organizer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h1 style="text-align:center; color:var(--primary);">Add New Course</h1>
            
            <form action="#" method="post">
                <label>Course Name</label>
                <input type="text" placeholder="e.g. Machine Learning" required>

                <label>Instructor</label>
                <input type="text" placeholder="Dr. / Prof. Name" required>

                <label>Credit Hours</label>
                <input type="number" min="1" max="6" value="3" required>

                <label>Notes</label>
                <textarea rows="5" placeholder="Any additional notes..."></textarea>

                <button type="submit">Add Course ✅</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer • All Rights Reserved</p>
    </footer>
</body>
</html>
