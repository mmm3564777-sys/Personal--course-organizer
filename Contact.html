<html lang="ar" dir="ltr">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">📚 Course Organizer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>

                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    <main>
        <div class="form-container">
            <h1 style="text-align:center; color:var(--primary);">Contact Us</h1>
            <p style="text-align:center; margin-bottom:2rem;">We'd love to hear from you!</p>
            
            <form action="#" method="post">
                <label>Your Name</label>
                <input type="text" required>

                <label>Email Address</label>
                <input type="email" required>

                <label>Message</label>
                <textarea rows="6" placeholder="Write your message here..." required></textarea>

                <button type="submit">Send Message 📨</button>
            </form>
        </div>
    </main>

    </footer>
